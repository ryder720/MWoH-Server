<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.H.I.E.L.D. Deck Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/ultimate.css">
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding-bottom: 0 !important;
        }

        .container {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding-bottom: 75px; /* Leave space for bottom fixed bar */
        }

        .selection-list {
            flex: 1;
            overflow-y: auto;
            max-height: none !important;
            padding-right: 4px;
        }

        .card-thumbnail {
            width: 38px;
            height: 38px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background-size: cover;
            background-position: center;
            background-color: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/ultimate/mypage" class="back-btn">&lt; BACK</a>
        <h1>DECK COMMAND</h1>
        <button class="back-btn" id="header-save-btn" onclick="saveLineup()" style="color: var(--hud-blue); border-color: rgba(0, 240, 255, 0.3); background: rgba(0, 240, 255, 0.05); font-size: 11px; cursor: pointer;">💾 SAVE</button>
    </div>

    <!-- Mode Tabs Sub-header -->
    <div class="tab-bar" style="position: sticky; top: 52px; width: 100%; max-width: 480px; padding: 6px 15px; background: rgba(3, 7, 18, 0.85); backdrop-filter: blur(8px); border-radius: 0; border-left: none; border-right: none; border-top: none; border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 99; margin: 0 auto; box-sizing: border-box; display: flex; gap: 8px; flex-shrink: 0;">
        <button class="tab-btn active" id="tab-attack" onclick="setMode('attack')" style="flex: 1; padding: 8px 10px;">ATTACK SQUAD</button>
        <button class="tab-btn" id="tab-defense" onclick="setMode('defense')" style="flex: 1; padding: 8px 10px;">DEFENSE SQUAD</button>
    </div>

    <div class="container">

        <!-- HUD Summary -->
        <div class="deck-hud-card">
            <div class="hud-row">
                <div>
                    <span class="hud-lbl">SQUAD ASSIGNMENT</span>
                    <div class="hud-val-large" id="slot-counter">0 / 5</div>
                </div>
                <div style="text-align: right;">
                    <span class="hud-lbl">POWER CAPACITY LIMIT</span>
                    <div class="hud-val-large" id="power-counter">0 / {{attackCapacity}}</div>
                </div>
            </div>
            
            <div class="bar-outer">
                <div class="bar-inner" id="power-bar" style="background: var(--hud-blue); width: 0%;"></div>
            </div>
            <div class="hud-lbl" id="error-msg" style="color: var(--accent-red); font-size: 10px; display: none;">WARNING: Power requirement exceeds available clearance capacity!</div>
            
            <!-- In-flow scrollable save control -->
            <button class="submit-btn" id="hud-save-btn" onclick="saveLineup()" style="margin-top: 15px; background: rgba(0, 240, 255, 0.1); border: 1px solid rgba(0, 240, 255, 0.4); color: #ffffff; padding: 10px; font-size: 11px; box-shadow: 0 4px 10px rgba(0, 240, 255, 0.15);">💾 SAVE SQUAD CONFIG</button>
        </div>

        <!-- Selectable cards list -->
        <div class="section-hdr">// RECRUITED SUPER HERO STOCK</div>
        <div class="selection-list" id="card-selection-grid">
            <!-- Rendered dynamically by JS -->
        </div>
    </div>

    <div class="footer-action">
        <button class="submit-btn" id="save-deck-btn" onclick="saveLineup()">SAVE LINEUP CONFIG</button>
    </div>

    <div class="toast" id="save-toast">LINEUP COMMITTED TO SECURE DB</div>

    <script>
        const cards = {{cardsJson}};
        const atkCapacity = {{attackCapacity}};
        const defCapacity = {{defenseCapacity}};
        
        let currentMode = 'attack'; // or 'defense'
        let selectedAttack = cards.filter(c => c.in_atk).map(c => c.id);
        let selectedDefense = cards.filter(c => c.in_def).map(c => c.id);

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('tab-attack').classList.toggle('active', mode === 'attack');
            document.getElementById('tab-defense').classList.toggle('active', mode === 'defense');
            
            const cap = (mode === 'attack') ? atkCapacity : defCapacity;
            document.getElementById('power-counter').textContent = '0 / ' + cap;
            
            renderCards();
            updateHUD();
        }

        function renderCards() {
            const grid = document.getElementById('card-selection-grid');
            grid.innerHTML = '';
            
            const activeList = (currentMode === 'attack') ? selectedAttack : selectedDefense;

            cards.forEach(c => {
                const isSelected = activeList.includes(c.id);
                const alignColor = c.alignment === 'Speed' ? '#00f0ff' : (c.alignment === 'Bruiser' ? '#ef4444' : '#f59e0b');

                const cardEl = document.createElement('div');
                cardEl.className = 'selectable-card' + (isSelected ? ' selected' : '');
                cardEl.onclick = () => toggleCard(c.id);

                cardEl.innerHTML = `
                    <div class="card-meta" style="display: flex; align-items: center; gap: 10px;">
                        <div class="alignment-indicator" style="background-color: ${alignColor}; box-shadow: 0 0 8px ${alignColor};"></div>
                        <div class="card-thumbnail" style="background-image: url('/images/cards/${c.imageFile}');">${c.imageFile ? '' : '🛡️'}</div>
                        <div class="card-details">
                            <span class="card-name-line">${c.title}</span>
                            <span class="card-subtext">${c.rarity.toUpperCase()} // LVL ${c.level} // ATK ${c.atk} // DEF ${c.def}</span>
                        </div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <span class="card-subtext" style="font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; color: #ffffff;">PWR: ${c.cost}</span>
                        <div class="checkbox-hud">${isSelected ? '✓' : ''}</div>
                    </div>
                `;
                grid.appendChild(cardEl);
            });
        }

        function toggleCard(cardId) {
            let activeList = (currentMode === 'attack') ? selectedAttack : selectedDefense;
            const idx = activeList.indexOf(cardId);
            
            if (idx > -1) {
                activeList.splice(idx, 1);
            } else {
                // Enforce 5 card limits
                if (activeList.length >= 5) {
                    alert('Squad reaches maximum capacity. Relegate an agent first.');
                    return;
                }
                activeList.push(cardId);
            }
            
            renderCards();
            updateHUD();
        }

        function updateHUD() {
            const activeList = (currentMode === 'attack') ? selectedAttack : selectedDefense;
            const cap = (currentMode === 'attack') ? atkCapacity : defCapacity;
            
            // Calculate total power requirements
            let totalCost = 0;
            activeList.forEach(id => {
                const card = cards.find(c => c.id === id);
                if (card) totalCost += card.cost;
            });

            document.getElementById('slot-counter').textContent = activeList.length + ' / 5';
            document.getElementById('power-counter').textContent = totalCost + ' / ' + cap;
            
            const pct = Math.min(100, (totalCost * 100) / cap);
            const bar = document.getElementById('power-bar');
            bar.style.width = pct + '%';
            
            const errorEl = document.getElementById('error-msg');
            const saveBtn1 = document.getElementById('save-deck-btn');
            const saveBtn2 = document.getElementById('header-save-btn');
            const saveBtn3 = document.getElementById('hud-save-btn');
            
            if (totalCost > cap) {
                bar.style.backgroundColor = 'var(--accent-red)';
                errorEl.style.display = 'block';
                if (saveBtn1) saveBtn1.disabled = true;
                if (saveBtn2) saveBtn2.disabled = true;
                if (saveBtn3) saveBtn3.disabled = true;
            } else {
                bar.style.backgroundColor = 'var(--hud-blue)';
                errorEl.style.display = 'none';
                if (saveBtn1) saveBtn1.disabled = false;
                if (saveBtn2) saveBtn2.disabled = false;
                if (saveBtn3) saveBtn3.disabled = false;
            }
        }

        function showToast(message) {
            const toast = document.getElementById('save-toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        function saveLineup() {
            const saveBtn1 = document.getElementById('save-deck-btn');
            const saveBtn2 = document.getElementById('header-save-btn');
            const saveBtn3 = document.getElementById('hud-save-btn');

            const setButtonsState = (disabled, text) => {
                if (saveBtn1) {
                    saveBtn1.disabled = disabled;
                    saveBtn1.textContent = text ? text : 'SAVE LINEUP CONFIG';
                }
                if (saveBtn2) {
                    saveBtn2.disabled = disabled;
                    saveBtn2.textContent = text ? (text === 'TRANSMITTING...' ? 'SYNC...' : '💾 SAVE') : '💾 SAVE';
                }
                if (saveBtn3) {
                    saveBtn3.disabled = disabled;
                    saveBtn3.textContent = text ? text.replace('LINEUP', 'SQUAD') : '💾 SAVE SQUAD CONFIG';
                }
            };

            setButtonsState(true, 'TRANSMITTING...');

            const activeList = (currentMode === 'attack') ? selectedAttack : selectedDefense;

            fetch('/ultimate/mypage/update_deck', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: `mode=${currentMode}&card_ids=${activeList.join(',')}`
            })
            .then(res => res.json())
            .then(data => {
                setButtonsState(false);
                if (data.success) {
                    showToast(data.message || 'Squad settings successfully secured!');
                } else {
                    alert(data.message || 'Transmission failed.');
                }
            })
            .catch(err => {
                setButtonsState(false);
                console.error(err);
                alert('Connection failure to secure terminal node.');
            });
        }

        // Initialize HUD
        // Parse mode from query parameter if available (e.g. ?mode=defense or ?deck_type=defense)
        const urlParams = new URLSearchParams(window.location.search);
        let initialMode = urlParams.get('mode') || urlParams.get('deck_type') || 'attack';
        if (initialMode !== 'attack' && initialMode !== 'defense') {
            initialMode = 'attack';
        }
        setMode(initialMode);
    </script>
</body>
</html>
