<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.H.I.E.L.D. Community Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030712;
            --hud-blue: #00f0ff;
            --hud-blue-glow: rgba(0, 240, 255, 0.4);
            --hud-green: #10b981;
            --hud-green-glow: rgba(16, 185, 129, 0.3);
            --accent-gold: #f59e0b;
            --accent-red: #ef4444;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --panel-bg: rgba(15, 23, 42, 0.65);
            --border-color: rgba(0, 240, 255, 0.2);
            --glass-reflection: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 50% 0%, rgba(0, 240, 255, 0.12) 0px, transparent 60%),
                linear-gradient(rgba(0, 240, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.015) 1px, transparent 1px);
            background-size: 100% 100%, 20px 20px, 20px 20px;
            color: var(--text-color);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Scanline Overlay for retro-futuristic terminal look */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.25) 50%
            );
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
        }

        .terminal-container {
            width: 100%;
            max-width: 420px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 35px 30px;
            backdrop-filter: blur(16px);
            box-shadow: 
                0 0 30px rgba(0, 240, 255, 0.05),
                0 20px 50px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            z-index: 20;
            animation: bootUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            text-align: center;
        }

        .terminal-container::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(135deg, var(--hud-blue), var(--accent-gold));
            border-radius: 18px;
            z-index: -1;
            opacity: 0.15;
            filter: blur(8px);
        }

        /* S.H.I.E.L.D. Rotating HUD Crest */
        .crest-area {
            margin: 0 auto 30px;
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hud-ring-outer {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px dashed var(--hud-blue);
            border-radius: 50%;
            opacity: 0.4;
            animation: spinClockwise 25s linear infinite;
        }

        .hud-ring-inner {
            position: absolute;
            width: 85%;
            height: 85%;
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-top: 2px solid var(--hud-blue);
            border-bottom: 2px solid var(--hud-blue);
            border-radius: 50%;
            animation: spinCounterClockwise 15s linear infinite;
        }

        .crest-center {
            position: relative;
            width: 60px;
            height: 60px;
            background: rgba(0, 240, 255, 0.05);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15);
        }

        .crest-icon {
            width: 36px;
            height: 36px;
            fill: var(--hud-blue);
            filter: drop-shadow(0 0 8px var(--hud-blue-glow));
        }

        /* Typography */
        .terminal-header {
            margin-bottom: 25px;
        }

        .terminal-tag {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--hud-blue);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.3);
        }

        .terminal-title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff 40%, var(--hud-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .terminal-desc {
            font-size: 13.5px;
            line-height: 1.6;
            color: var(--text-muted);
            padding: 0 5px;
        }

        /* Status panel */
        .status-box {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(0, 240, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--hud-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--hud-green-glow);
            animation: pulse 1.5s infinite alternate;
        }

        .status-text {
            color: var(--hud-green);
            font-weight: bold;
        }

        /* Interactive Buttons */
        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--hud-blue) 0%, #00bcff 100%);
            color: #030712;
            border: none;
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 240, 255, 0.45);
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
            transform: translateY(-1px);
        }

        .btn-secondary:active {
            transform: translateY(1px);
        }

        /* Animations */
        @keyframes bootUp {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes spinClockwise {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes spinCounterClockwise {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        @keyframes pulse {
            from { opacity: 0.5; box-shadow: 0 0 4px var(--hud-green-glow); }
            to { opacity: 1; box-shadow: 0 0 12px var(--hud-green); }
        }

        .btn-icon {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>

    <div class="terminal-container">
        <!-- HUD Crest Area -->
        <div class="crest-area">
            <div class="hud-ring-outer"></div>
            <div class="hud-ring-inner"></div>
            <div class="crest-center">
                <svg class="crest-icon" viewBox="0 0 24 24">
                    <path d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3zm0 10h6c-.47 3.51-2.92 6.55-6 7.42V12H6V7.21l6-2.25V12z"/>
                </svg>
            </div>
        </div>

        <!-- Terminal Header -->
        <div class="terminal-header">
            <span class="terminal-tag">// SECURE UPLINK ACTIVE</span>
            <h1 class="terminal-title">S.H.I.E.L.D. Operations</h1>
            <p class="terminal-desc">Connect with other active agents, track server development updates, and access database tools.</p>
        </div>

        <!-- Live Status Bar -->
        <div class="status-box">
            <div class="status-dot"></div>
            <span class="status-text">COMMUNITY LINK READY</span>
        </div>

        <!-- Action Button Stack -->
        <div class="btn-stack">
            <a id="communityLink" href="{{communityUrl}}" class="btn btn-primary">
                <span class="btn-icon">🌐</span>
                <span>Access Community Node</span>
            </a>
            
            <a href="ngcore://closeWebView?status=success" class="btn btn-secondary">
                <span class="btn-icon">↩️</span>
                <span>Return to Mission</span>
            </a>
        </div>
    </div>

    <script>
        // Intercept click to open link in system browser if possible,
        // or attempt standard navigation with feedback
        document.getElementById('communityLink').addEventListener('click', function(e) {
            console.log("Community Link clicked. Navigating to: " + this.href);
            // Some WebViews block window.open. In that case, standard href takes over.
            // If the native browser needs to be explicitly targeted, we allow the link to navigate.
        });
    </script>
</body>
</html>
