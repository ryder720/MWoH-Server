<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.H.I.E.L.D. Daily Commendations Dossier</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/ultimate.css">
    <style>
        /* Modern Glassmorphic Campaigns Layout */
        .campaign-container {
            background: rgba(13, 20, 35, 0.45);
            border: 1px solid rgba(0, 240, 255, 0.15);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        
        .campaign-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.4), transparent);
        }

        .campaign-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            border-bottom: 1px dashed rgba(0, 240, 255, 0.15);
            padding-bottom: 12px;
            margin-bottom: 16px;
        }

        .campaign-title {
            font-size: 16px;
            font-weight: 800;
            color: #ffffff;
            margin: 0 0 4px 0;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .campaign-desc {
            font-size: 11px;
            color: var(--text-muted);
            margin: 0;
            line-height: 1.4;
        }

        .campaign-status {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        /* Timers */
        .commendation-timer {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            font-weight: 700;
            color: var(--accent-gold);
            letter-spacing: 0.5px;
            background: rgba(245, 158, 11, 0.05);
            border: 1px solid rgba(245, 158, 11, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
        }

        .commendation-timer.infinite {
            color: var(--hud-green);
            background: rgba(16, 185, 129, 0.05);
            border: 1px solid rgba(16, 185, 129, 0.15);
        }

        .commendation-timer.active {
            color: var(--hud-blue);
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.15);
            animation: pulse-border 1.5s infinite;
        }

        /* 3-Column Grid for Day-Boxes */
        .commendations-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        /* Grid box styles */
        .day-box {
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 12px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 110px;
            box-sizing: border-box;
        }

        .day-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.015) 0%, transparent 100%);
            pointer-events: none;
        }

        /* Claimed State */
        .day-box.claimed {
            border-color: rgba(16, 185, 129, 0.35);
            background: rgba(16, 185, 129, 0.03);
            box-shadow: inset 0 0 10px rgba(16, 185, 129, 0.05);
        }

        .day-box.claimed::after {
            content: '✓';
            position: absolute;
            top: -10px;
            right: -5px;
            font-size: 32px;
            font-weight: 800;
            color: rgba(16, 185, 129, 0.12);
            font-family: 'Outfit', sans-serif;
            pointer-events: none;
        }

        .day-box.claimed .day-num {
            color: #10b981;
        }

        .day-box.claimed .day-icon {
            filter: grayscale(80%) opacity(50%);
        }

        .day-box.claimed .day-reward {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        /* Active/Today State */
        .day-box.active {
            border-color: var(--hud-blue);
            background: rgba(0, 240, 255, 0.06);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15), inset 0 0 12px rgba(0, 240, 255, 0.08);
            animation: active-glow 2.5s infinite alternate;
        }

        .day-box.active .day-num {
            color: var(--hud-blue);
            font-weight: 700;
            text-shadow: 0 0 6px rgba(0, 240, 255, 0.4);
        }

        .day-box.active .day-icon {
            transform: scale(1.1);
            filter: drop-shadow(0 0 6px rgba(0, 240, 255, 0.3));
            animation: bounce-small 2s infinite ease-in-out;
        }

        .day-box.active .day-reward {
            color: #ffffff;
            font-weight: 600;
        }

        /* Locked State */
        .day-box.locked {
            opacity: 0.65;
            background: rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.04);
        }

        .day-box.locked:hover {
            opacity: 0.85;
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* Child elements inside day boxes */
        .day-num {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            font-weight: 700;
            color: #94a3b8;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .day-icon {
            font-size: 24px;
            margin: 6px 0;
            transition: transform 0.2s ease;
        }

        .day-reward {
            font-size: 10px;
            color: #e2e8f0;
            text-align: center;
            line-height: 1.3;
            margin-bottom: 6px;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-lbl {
            font-family: 'Space Mono', monospace;
            font-size: 7.5px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            padding: 1px 5px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: var(--text-muted);
        }

        .day-box.claimed .status-lbl {
            background: rgba(16, 185, 129, 0.06);
            border-color: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .day-box.active .status-lbl {
            background: rgba(0, 240, 255, 0.08);
            border-color: rgba(0, 240, 255, 0.25);
            color: var(--hud-blue);
        }

        /* Pulsing & animations */
        @keyframes active-glow {
            0% {
                border-color: rgba(0, 240, 255, 0.3);
                box-shadow: 0 0 10px rgba(0, 240, 255, 0.1), inset 0 0 8px rgba(0, 240, 255, 0.04);
            }
            100% {
                border-color: rgba(0, 240, 255, 0.65);
                box-shadow: 0 0 18px rgba(0, 240, 255, 0.25), inset 0 0 14px rgba(0, 240, 255, 0.12);
            }
        }

        @keyframes pulse-border {
            0% { border-color: rgba(0, 240, 255, 0.15); }
            50% { border-color: rgba(0, 240, 255, 0.4); }
            100% { border-color: rgba(0, 240, 255, 0.15); }
        }

        @keyframes bounce-small {
            0%, 100% { transform: translateY(0) scale(1.1); }
            50% { transform: translateY(-3px) scale(1.1); }
        }

        .pulsing-cyan {
            animation: pulse-opacity 1.5s infinite;
        }

        @keyframes pulse-opacity {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* Agent status overlay bar */
        .agent-status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(13, 20, 35, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 10px;
        }
        
        .agent-status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Space Mono', monospace;
            color: var(--text-muted);
        }
        
        .agent-status-item span {
            color: #ffffff;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/ultimate/menu" class="back-btn">&lt; HUB</a>
        <h1>DAILY COMMENDATIONS</h1>
        <div style="width: 50px;"></div>
    </div>

    <div class="container" style="padding-bottom: 60px;">
        <!-- Agent stats overlay -->
        <div class="agent-status-bar">
            <div class="agent-status-item">
                👤 DOSSIER: <span>{{agentName}}</span>
            </div>
            <div class="agent-status-item">
                ⚡ ENERGY: <span>{{energyCur}} / {{energyMax}} ({{energyPct}}%)</span>
            </div>
            <div class="agent-status-item">
                ⭐ LEVEL: <span>{{level}}</span>
            </div>
        </div>

        <div class="section-hdr">// ACTIVE DAILY CALENDARS</div>

        <!-- Rendered campaign list injects here -->
        {{commendationsHtml}}

    </div>

    <div class="footer">
        // COMMAND TERMINAL SECURE ACCESS // AGENT CALENDAR MATRIX
    </div>

    <script>
        function initializeTimers() {
            const timerElements = document.querySelectorAll('.commendation-timer[data-seconds]');
            
            timerElements.forEach(el => {
                let seconds = parseInt(el.getAttribute('data-seconds'), 10);
                if (isNaN(seconds) || seconds <= 0) return;

                function update() {
                    if (seconds <= 0) {
                        el.innerHTML = "⏱️ CYCLE ROLLOVER ACTIVE - REFRESH";
                        el.className = "commendation-timer active";
                        return;
                    }
                    
                    const hours = Math.floor(seconds / 3600);
                    let rem = seconds % 3600;
                    const mins = Math.floor(rem / 60);
                    const secs = rem % 60;

                    const hoursStr = String(hours).padStart(2, '0');
                    const minsStr = String(mins).padStart(2, '0');
                    const secsStr = String(secs).padStart(2, '0');

                    el.innerHTML = `⏱️ NEXT STAMP IN: ${hoursStr}h ${minsStr}m ${secsStr}s`;
                    seconds--;
                }
                
                update();
                setInterval(update, 1000);
            });
        }

        document.addEventListener('DOMContentLoaded', initializeTimers);
    </script>
</body>
</html>
